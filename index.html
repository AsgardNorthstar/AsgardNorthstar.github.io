<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ASGARD NORTHSTAR TECHNOLOGIES</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: "Inter", "Segoe UI", Arial, sans-serif;
            overflow-x: hidden;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .logo {
            width: 160px;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeIn 1.5s ease forwards;
        }

        h1 {
            font-size: 48px;
            font-weight: 600;
            margin: 0;
            letter-spacing: 4px;
            opacity: 0;
            animation: fadeIn 1.5s ease forwards 0.3s;
        }

        p {
            font-size: 22px;
            max-width: 700px;
            margin-top: 20px;
            opacity: 0;
            animation: fadeIn 1.5s ease forwards 0.6s;
            letter-spacing: 1px;
        }

        .grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            animation: fadeGrid 6s ease-in-out infinite alternate;
        }

        @keyframes fadeGrid {
            from { opacity: 0.05; }
            to { opacity: 0.15; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="grid"></div>

<div class="hero">
    <img src="logo.png" class="logo" alt="Asgard Northstar Logo">
    <h1>ASGARD NORTHSTAR TECHNOLOGIES</h1>
    <p>UBIQUITOUS CONTINUUM</p>
</div>

</body>
</html>
