<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Asgard Northstar Technologies</title>
    <style>
        body {
            margin: 0;
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: "Inter", Arial, sans-serif;
            overflow-x: hidden;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        h1 {
            font-size: 64px;
            font-weight: 600;
            margin: 0;
            letter-spacing: -1px;
        }

        p {
            font-size: 22px;
            max-width: 700px;
            margin-top: 20px;
            opacity: 0.8;
            line-height: 1.5;
        }

        .grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            animation: fadeGrid 6s ease-in-out infinite alternate;
        }

        @keyframes fadeGrid {
            from { opacity: 0.05; }
            to { opacity: 0.15; }
        }
    </style>
</head>
<body>

<div class="grid"></div>

<div class="hero">
    <h1>Asgard Northstar Technologies</h1>
    <p>Engineering systems, software, and ideas for the next generation of innovation.</p>
</div>

</body>
</html>
